# Test-specific overrides
# Increase HTTP client read timeout to accommodate resilience pattern tests
# (e.g., TimeLimiter needs time to trigger server-side timeout before client gives up)
micronaut.http.client.read-timeout=10s

application.api.response.include-metadata=true
application.api.response.include-stacktrace=true
application.api.response.include-environment-info=true

# Standard browser-like User-Agent for testing
application.api.client.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36 (TestMode)
