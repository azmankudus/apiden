# app name
micronaut.application.name=apiden
micronaut.server.context-path=/api

# i18n configuration
micronaut.i18n.resource-bundle.base-names=messages
micronaut.server.locale-resolution.default-locale=en
micronaut.server.locale-resolution.cookie.enabled=true
micronaut.server.locale-resolution.cookie.cookie-name=LOCALE

# log level
logger.levels.root=INFO
logger.levels.com.example.apiden=INFO

# app instance name
application.instance.name=apiden-instance-1

# api response includes
application.api.response.include-metadata=false
application.api.response.include-stacktrace=false
application.api.response.include-environment-info=false

# api client base configuration
application.api.client.user-agent=Apiden/0.1 (Java-http-client)

# live update config
application.configuration.live-update.enabled=true
application.configuration.live-update.list=\
  application.api.response.include-metadata,\
  application.api.response.include-stacktrace,\
  application.api.response.include-environment-info

# Management Endpoints
endpoints.all.enabled=true
endpoints.all.sensitive=false
endpoints.loggers.write-sensitive=false

# Metrics & Prometheus
micronaut.metrics.enabled=true
micronaut.metrics.export.prometheus.enabled=true
micronaut.metrics.export.prometheus.descriptions=true
micronaut.metrics.export.prometheus.step=PT1M

# OpenAPI / Swagger UI
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**

# ============================================================================
# Resilience4j Configuration — Best Practices
# ============================================================================

# --- Circuit Breaker ---
# Prevents cascading failures by tripping after a threshold of failures.
# CLOSED → OPEN when failureRate >= threshold within the sliding window.
# OPEN → HALF_OPEN after waitDuration. HALF_OPEN → CLOSED if probes succeed.

# Instance: backendService (used by individual CircuitBreakerController)
resilience4j.circuitbreaker.instances.backendService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.backendService.sliding-window-size=10
resilience4j.circuitbreaker.instances.backendService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.backendService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.backendService.wait-duration-in-open-state=PT10S
resilience4j.circuitbreaker.instances.backendService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.backendService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.backendService.record-exceptions=java.lang.RuntimeException

# Instance: combinedService (used by CombinedResilienceController)
resilience4j.circuitbreaker.instances.combinedService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.combinedService.sliding-window-size=5
resilience4j.circuitbreaker.instances.combinedService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.combinedService.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.combinedService.wait-duration-in-open-state=PT15S
resilience4j.circuitbreaker.instances.combinedService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.combinedService.automatic-transition-from-open-to-half-open-enabled=true

# --- Retry ---
# Retries transient failures with exponential back-off to avoid thundering herd.

# Instance: backendService (used by individual RetryController and HelloService)
resilience4j.retry.instances.backendService.max-attempts=3
resilience4j.retry.instances.backendService.wait-duration=PT1S
resilience4j.retry.instances.backendService.enable-exponential-backoff=true
resilience4j.retry.instances.backendService.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.backendService.retry-exceptions=java.lang.RuntimeException

# Instance: helloService (used by HelloService @Retry)
resilience4j.retry.instances.helloService.max-attempts=3
resilience4j.retry.instances.helloService.wait-duration=PT0.5S

# Instance: combinedService
resilience4j.retry.instances.combinedService.max-attempts=2
resilience4j.retry.instances.combinedService.wait-duration=PT0.5S
resilience4j.retry.instances.combinedService.enable-exponential-backoff=true
resilience4j.retry.instances.combinedService.exponential-backoff-multiplier=1.5

# --- Rate Limiter ---
# Controls throughput by limiting calls per refresh period.
# limitForPeriod = max calls allowed in each limitRefreshPeriod window.
# timeoutDuration = how long a blocked call waits for a permit (0 = immediate reject).

# Instance: backendService (used by individual RateLimiterController)
resilience4j.ratelimiter.instances.backendService.limit-for-period=5
resilience4j.ratelimiter.instances.backendService.limit-refresh-period=PT10S
resilience4j.ratelimiter.instances.backendService.timeout-duration=PT0S

# Instance: combinedService
resilience4j.ratelimiter.instances.combinedService.limit-for-period=10
resilience4j.ratelimiter.instances.combinedService.limit-refresh-period=PT10S
resilience4j.ratelimiter.instances.combinedService.timeout-duration=PT2S

# --- Time Limiter ---
# Enforces maximum execution duration for asynchronous operations.
# cancelRunningFuture = true ensures timed-out futures release their thread.

# Instance: backendService (used by individual TimeLimiterController)
resilience4j.timelimiter.instances.backendService.timeout-duration=PT2S
resilience4j.timelimiter.instances.backendService.cancel-running-future=true

# Instance: combinedService
resilience4j.timelimiter.instances.combinedService.timeout-duration=PT3S
resilience4j.timelimiter.instances.combinedService.cancel-running-future=true

# --- Bulkhead (Semaphore-based) ---
# Limits concurrent calls to prevent thread-pool exhaustion.
# maxConcurrentCalls = number of simultaneous permits.
# maxWaitDuration = how long excess calls wait for a permit (0 = immediate reject).

# Instance: backendService (used by individual BulkheadController)
resilience4j.bulkhead.instances.backendService.max-concurrent-calls=3
resilience4j.bulkhead.instances.backendService.max-wait-duration=PT0S

# Instance: combinedService
resilience4j.bulkhead.instances.combinedService.max-concurrent-calls=5
resilience4j.bulkhead.instances.combinedService.max-wait-duration=PT1S

# ============================================================================
# Custom Resilience Configuration (com.example.apiden)
# ============================================================================
# Global toggle for all resilience patterns
resilience.enabled=true
# Whether to export Resilience4j metrics via Micrometer
resilience.metrics-enabled=true
# Description surfaced via the /resilience/config endpoint
resilience.description=Resilience4j patterns for microservices fault tolerance
